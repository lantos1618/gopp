<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>go++ playground</title>
<style>
  :root {
    --bg: #1e1f24;
    --panel: #26272e;
    --border: #3a3b42;
    --fg: #e4e4e8;
    --dim: #9a9ba3;
    --accent: #6cb6ff;
    --ok: #7ee787;
    --err: #ff7b72;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header select, header button {
    background: var(--panel);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font: inherit;
  }
  header button { cursor: pointer; background: var(--accent); color: #10141c; border-color: var(--accent); font-weight: 600; }
  header button:disabled { opacity: 0.5; cursor: default; }
  header .hint { color: var(--dim); font-size: 12px; }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    min-height: 0;
  }
  .col { display: flex; flex-direction: column; background: var(--bg); min-height: 0; }
  textarea, pre {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    border: none;
    outline: none;
    padding: 12px 16px;
    font: 13px/1.5 ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
    tab-size: 4;
  }
  textarea { flex: 3; resize: none; min-height: 0; white-space: pre; }
  #out { flex: 2; overflow: auto; min-height: 0; white-space: pre; }
  #diags {
    flex: 1;
    overflow: auto;
    border-top: 1px solid var(--border);
    white-space: pre-wrap;
    min-height: 0;
  }
  #diags.ok { color: var(--ok); }
  #diags.err { color: var(--err); }
  .label {
    padding: 6px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
  }
  #status { margin-left: auto; color: var(--dim); font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>go++ playground</h1>
  <select id="examples" title="load an example"></select>
  <button id="compile" disabled>Compile</button>
  <span class="hint">Ctrl+Enter to compile</span>
  <span id="status">loading compiler…</span>
</header>
<main>
  <div class="col">
    <div class="label">go++ source</div>
    <textarea id="src" spellcheck="false"></textarea>
    <div class="label">Diagnostics</div>
    <pre id="diags">compiling…</pre>
  </div>
  <div class="col">
    <div class="label">Generated Go</div>
    <pre id="out"></pre>
  </div>
</main>
<script src="wasm_exec.js"></script>
<script src="playground.js"></script>
</body>
</html>
